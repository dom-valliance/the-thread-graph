apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: app-secrets
  namespace: valliance-graph
  labels:
    app.kubernetes.io/part-of: valliance-graph
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: azure-keyvault
    kind: ClusterSecretStore
  target:
    name: app-secrets
    creationPolicy: Owner
  data:
    - secretKey: neo4j-password
      remoteRef:
        key: neo4j-password
    - secretKey: neo4j-auth
      remoteRef:
        key: neo4j-auth
    - secretKey: notion-api-key
      remoteRef:
        key: notion-api-key
    - secretKey: anthropic-api-key
      remoteRef:
        key: anthropic-api-key
    - secretKey: azure-ad-tenant-id
      remoteRef:
        key: azure-ad-tenant-id
    - secretKey: azure-ad-client-id
      remoteRef:
        key: azure-ad-client-id
