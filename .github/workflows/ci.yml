name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - name: web
            path: apps/web
            command: pnpm lint
          - name: api
            path: apps/api
            command: ruff check .
          - name: nlp
            path: apps/nlp
            command: ruff check .
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        if: matrix.target.name == 'web'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        if: matrix.target.name == 'web'
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Install web dependencies
        if: matrix.target.name == 'web'
        run: pnpm install --frozen-lockfile
        working-directory: ${{ matrix.target.path }}

      - name: Set up Python
        if: matrix.target.name != 'web'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python linters
        if: matrix.target.name != 'web'
        run: pip install ruff

      - name: Run lint
        run: ${{ matrix.target.command }}
        working-directory: ${{ matrix.target.path }}

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - name: web
            path: apps/web
            command: pnpm tsc --noEmit
          - name: api
            path: apps/api
            command: mypy .
          - name: nlp
            path: apps/nlp
            command: mypy .
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        if: matrix.target.name == 'web'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        if: matrix.target.name == 'web'
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Install web dependencies
        if: matrix.target.name == 'web'
        run: pnpm install --frozen-lockfile
        working-directory: ${{ matrix.target.path }}

      - name: Set up Python
        if: matrix.target.name != 'web'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        if: matrix.target.name != 'web'
        run: |
          pip install uv
          uv pip install --system -e ".[dev]"
        working-directory: ${{ matrix.target.path }}

      - name: Run type check
        run: ${{ matrix.target.command }}
        working-directory: ${{ matrix.target.path }}

  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - name: web
            path: apps/web
            command: pnpm vitest run --coverage
          - name: api
            path: apps/api
            command: pytest --cov --cov-report=xml
          - name: nlp
            path: apps/nlp
            command: pytest --cov --cov-report=xml
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        if: matrix.target.name == 'web'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        if: matrix.target.name == 'web'
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Install web dependencies
        if: matrix.target.name == 'web'
        run: pnpm install --frozen-lockfile
        working-directory: ${{ matrix.target.path }}

      - name: Set up Python
        if: matrix.target.name != 'web'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        if: matrix.target.name != 'web'
        run: |
          pip install uv
          uv pip install --system -e ".[dev]"
        working-directory: ${{ matrix.target.path }}

      - name: Run tests
        run: ${{ matrix.target.command }}
        working-directory: ${{ matrix.target.path }}

  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - name: web
            dockerfile: infra/docker/web.Dockerfile
            context: apps/web
          - name: api
            dockerfile: infra/docker/api.Dockerfile
            context: apps/api
          - name: nlp
            dockerfile: infra/docker/nlp.Dockerfile
            context: apps/nlp
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: false
          tags: valliance-graph-${{ matrix.service.name }}:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5"

      - name: Terraform Init
        run: terraform init -backend=false
        working-directory: infra/terraform

      - name: Terraform Validate
        run: terraform validate
        working-directory: infra/terraform

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        working-directory: infra/terraform
