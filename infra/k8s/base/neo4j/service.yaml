apiVersion: v1
kind: Service
metadata:
  name: neo4j
  namespace: valliance-graph
  labels:
    app.kubernetes.io/name: neo4j
    app.kubernetes.io/part-of: valliance-graph
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - port: 7474
      targetPort: 7474
      name: http
      protocol: TCP
    - port: 7687
      targetPort: 7687
      name: bolt
      protocol: TCP
  selector:
    app.kubernetes.io/name: neo4j
