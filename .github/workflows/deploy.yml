name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy
  cancel-in-progress: false

env:
  ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
  AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}

jobs:
  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - name: web
            dockerfile: infra/docker/web.Dockerfile
            context: apps/web
          - name: api
            dockerfile: infra/docker/api.Dockerfile
            context: apps/api
          - name: nlp
            dockerfile: infra/docker/nlp.Dockerfile
            context: apps/nlp
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ env.AZURE_CREDENTIALS }}

      - name: Log in to ACR
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/valliance-graph-${{ matrix.service.name }}:${{ github.sha }}
            ${{ env.ACR_LOGIN_SERVER }}/valliance-graph-${{ matrix.service.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-dev:
    name: Deploy to Dev
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ env.AZURE_CREDENTIALS }}

      - name: Set AKS context
        uses: azure/aks-set-context@v3
        with:
          resource-group: rg-valliance-graph-dev
          cluster-name: aks-valliance-graph-dev

      - name: Set image tags
        run: |
          cd infra/k8s/overlays/dev
          kustomize edit set image \
            ACR_LOGIN_SERVER/valliance-graph-web=${{ env.ACR_LOGIN_SERVER }}/valliance-graph-web:${{ github.sha }} \
            ACR_LOGIN_SERVER/valliance-graph-api=${{ env.ACR_LOGIN_SERVER }}/valliance-graph-api:${{ github.sha }} \
            ACR_LOGIN_SERVER/valliance-graph-nlp=${{ env.ACR_LOGIN_SERVER }}/valliance-graph-nlp:${{ github.sha }}

      - name: Deploy
        run: kubectl apply -k infra/k8s/overlays/dev

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/web -n valliance-graph --timeout=300s
          kubectl rollout status deployment/api -n valliance-graph --timeout=300s

  deploy-staging:
    name: Deploy to Staging
    needs: deploy-dev
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ env.AZURE_CREDENTIALS }}

      - name: Set AKS context
        uses: azure/aks-set-context@v3
        with:
          resource-group: rg-valliance-graph-staging
          cluster-name: aks-valliance-graph-staging

      - name: Set image tags
        run: |
          cd infra/k8s/overlays/staging
          kustomize edit set image \
            ACR_LOGIN_SERVER/valliance-graph-web=${{ env.ACR_LOGIN_SERVER }}/valliance-graph-web:${{ github.sha }} \
            ACR_LOGIN_SERVER/valliance-graph-api=${{ env.ACR_LOGIN_SERVER }}/valliance-graph-api:${{ github.sha }} \
            ACR_LOGIN_SERVER/valliance-graph-nlp=${{ env.ACR_LOGIN_SERVER }}/valliance-graph-nlp:${{ github.sha }}

      - name: Deploy
        run: kubectl apply -k infra/k8s/overlays/staging

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/web -n valliance-graph --timeout=300s
          kubectl rollout status deployment/api -n valliance-graph --timeout=300s

  deploy-prod:
    name: Deploy to Production
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ env.AZURE_CREDENTIALS }}

      - name: Set AKS context
        uses: azure/aks-set-context@v3
        with:
          resource-group: rg-valliance-graph-prod
          cluster-name: aks-valliance-graph-prod

      - name: Set image tags
        run: |
          cd infra/k8s/overlays/prod
          kustomize edit set image \
            ACR_LOGIN_SERVER/valliance-graph-web=${{ env.ACR_LOGIN_SERVER }}/valliance-graph-web:${{ github.sha }} \
            ACR_LOGIN_SERVER/valliance-graph-api=${{ env.ACR_LOGIN_SERVER }}/valliance-graph-api:${{ github.sha }} \
            ACR_LOGIN_SERVER/valliance-graph-nlp=${{ env.ACR_LOGIN_SERVER }}/valliance-graph-nlp:${{ github.sha }}

      - name: Deploy
        run: kubectl apply -k infra/k8s/overlays/prod

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/web -n valliance-graph --timeout=300s
          kubectl rollout status deployment/api -n valliance-graph --timeout=300s
